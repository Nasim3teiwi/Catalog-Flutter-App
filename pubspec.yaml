name: catalog_app
description: "Offline product catalog and order-taking app for salespersons."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  provider: ^6.1.4
  intl: ^0.20.2
  badges: ^3.1.2
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  image: ^4.2.0
  pdf: ^3.11.1
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/Cairo-Regular.ttf
    - assets/fonts/NotoSans-Regular.ttf
